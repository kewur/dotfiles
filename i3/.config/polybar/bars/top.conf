
[bar/top]
monitor = ${env:MONITOR:}
width = 100%
height = 30
border-size = 1
border-top-size = 0
border-left-size = 0
border-right-size = 0
border-bottom-size = 0
radius-top = 0
radius-bottom = 0
line-size = 2
spacing = 1
offset-x = 0
offset-y = 0
padding-left = 0
padding-right = 2

tray-position = right
tray-detached = false
tray-padding = 2
tray-background = ${colors.background-alt}

wm-restack = i3
override-redirect = true

font-0 = "FiraCode Nerd Font Mono:antialias=true:size=12;1"
font-1 = "DejaVuSansMono_Nerd_Font_Book:antialias=true:size=12;2"
dpi-x = 0
dpi-y = 0

background = ${colors.background}
foreground = ${colors.foreground}
module-margin-left = 2
module-margin-right = 0
modules-left = i3
modules-center = date
modules-right = pulseaudio powermenu